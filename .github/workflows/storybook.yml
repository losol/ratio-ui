name: Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: ratio-ui

jobs:
  deploy:
    name: Build & deploy Storybook
    runs-on: ubuntu-latest
    # Track the production deploy as a "storybook" deployment (live URL + history
    # in the Environments tab). Empty name on PRs => no environment is attached.
    environment:
      name: ${{ github.event_name == 'push' && 'storybook' || '' }}
      url: https://ratio-ui.pages.dev
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Deploy Storybook
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy storybook-static --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main --commit-dirty=true

      # Fork PRs do not get repository secrets, and Dependabot runs read from a
      # separate secrets store (so the Cloudflare secrets come through empty),
      # so only deploy/comment for non-Dependabot branches pushed to this repo.
      - name: Deploy preview Storybook
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npx wrangler@4 pages deploy storybook-static --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=preview-${PR_NUMBER} --commit-dirty=true

      - name: Comment preview URL
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY="Storybook preview: https://preview-${PR_NUMBER}.${CLOUDFLARE_PAGES_PROJECT}.pages.dev"
          gh pr comment "$PR_NUMBER" --body "$BODY" --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --body "$BODY"
