version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
    commit-message:
      prefix: "Deps"
    # Don't open PRs for releases younger than 10 days (supply-chain delay).
    # Storybook is dev-only, excluded from this rule.
    cooldown:
      default-days: 10
      exclude:
        - "storybook"
        - "@storybook/*"
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---- GitHub Actions (low churn — monthly is plenty) ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: "Europe/Oslo"
    labels:
      - "deps"
    commit-message:
      prefix: "Deps (CI)"
    cooldown:
      default-days: 10
    groups:
      github-actions:
        patterns:
          - "*"
